<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Delphi — Decision Intelligence Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0e0c0b;color:#f0ece6;font-family:'Space Grotesk',sans-serif;font-size:13px;line-height:1.5;overflow:hidden}
#root{width:100%;height:100%;display:flex}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2c2820;border-radius:2px}
button,input{font-family:inherit;outline:none}
input[type=range]{cursor:pointer;-webkit-appearance:none;appearance:none;background:transparent}
input[type=range]::-webkit-slider-runnable-track{height:3px;background:#2c2820;border-radius:2px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:currentColor;margin-top:-4.5px;cursor:pointer}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── DESIGN TOKENS ──────────────────────────────────────────────────────────
const C = {
  bg:       '#0e0c0b',
  card:     '#151210',
  card2:    '#1c1915',
  card3:    '#232018',
  border:   '#2a2520',
  border2:  '#3a3430',
  orange:   '#ff5500',
  cyan:     '#00d4b4',
  purple:   '#b040ff',
  text1:    '#f0ece6',
  text2:    '#9a9490',
  text3:    '#5a5450',
  green:    '#00e87a',
  amber:    '#ffaa00',
  red:      '#ff3545',
};
const mono = { fontFamily: "'Space Mono', monospace" };

// ── PRIMITIVES ─────────────────────────────────────────────────────────────
const Badge = ({ children, color = C.text3 }) => (
  <span style={{
    display:'inline-flex',alignItems:'center',padding:'2px 7px',
    borderRadius:3,fontSize:9,fontWeight:700,letterSpacing:'0.1em',
    textTransform:'uppercase',border:`1px solid ${color}44`,
    color,background:`${color}14`,...mono,lineHeight:'16px'
  }}>{children}</span>
);

const Dot = ({ color, pulse }) => (
  <span style={{
    width:6,height:6,borderRadius:'50%',background:color,display:'inline-block',
    flexShrink:0,boxShadow:pulse?`0 0 0 3px ${color}30`:undefined
  }}/>
);

const Card = ({ children, style, onClick }) => {
  const [hov, setHov] = useState(false);
  return (
    <div onClick={onClick}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{background:C.card,border:`1px solid ${hov&&onClick?C.border2:C.border}`,
        borderRadius:6,padding:14,cursor:onClick?'pointer':'default',
        transition:'border-color 0.12s',...style}}>
      {children}
    </div>
  );
};

const SLabel = ({ children, right }) => (
  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
    <span style={{fontSize:9,fontWeight:700,letterSpacing:'0.12em',textTransform:'uppercase',color:C.text3,...mono}}>{children}</span>
    {right}
  </div>
);

const Bar = ({ value, color = C.cyan, h = 4, style }) => (
  <div style={{background:C.border,borderRadius:2,height:h,overflow:'hidden',...style}}>
    <div style={{width:`${Math.min(100,value)}%`,height:'100%',background:color,borderRadius:2,transition:'width 0.4s ease'}}/>
  </div>
);

const Btn = ({ children, onClick, primary, sm, style, full }) => (
  <button onClick={onClick} style={{
    background: primary ? C.orange : 'transparent',
    color: primary ? '#fff' : C.text2,
    border:`1px solid ${primary?C.orange:C.border2}`,
    borderRadius:4,padding:sm?'4px 11px':'7px 14px',
    fontSize:sm?10:11,fontWeight:700,letterSpacing:'0.07em',
    textTransform:'uppercase',cursor:'pointer',transition:'opacity 0.12s',
    width:full?'100%':undefined,...mono,...style
  }}>{children}</button>
);

const MiniChart = ({ points, color, height=50, fill }) => {
  const w=220, h=height, pad=4;
  const min=Math.min(...points), max=Math.max(...points), range=max-min||1;
  const pts=points.map((v,i)=>`${pad+i*(w-pad*2)/(points.length-1)},${h-pad-(v-min)/range*(h-pad*2)}`).join(' ');
  return (
    <svg width="100%" height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      {fill && <defs>
        <linearGradient id={`g${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>}
      {fill && <polygon points={`${pts} ${pad+(points.length-1)*(w-pad*2)/(points.length-1)},${h} ${pad},${h}`}
        fill={`url(#g${color.replace('#','')})`}/>}
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
    </svg>
  );
};

// ── SIDEBAR ────────────────────────────────────────────────────────────────
const NAV = [
  {id:'wizard',   label:'Decision Wizard',    icon:'◇'},
  {id:'command',  label:'Command Center',     icon:'⊕'},
  {id:'mission',  label:'Mission Control',   icon:'◈'},
  {id:'theater',  label:'Decision Theater',  icon:'⬡'},
  {id:'log',      label:'Decision Log',      icon:'≡'},
  {id:'intel',    label:'Intelligence',      icon:'◎'},
  {id:'govern',   label:'Governance',        icon:'⬟'},
  {id:'workspace',label:'Workspace',          icon:'⬢'},
];

const Sidebar = ({ active, onNav }) => (
  <div style={{width:210,flexShrink:0,background:C.card,borderRight:`1px solid ${C.border}`,
    display:'flex',flexDirection:'column',height:'100%'}}>
    <div style={{padding:'18px 18px 14px',borderBottom:`1px solid ${C.border}`}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:28,height:28,background:C.orange,borderRadius:6,display:'flex',
          alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:700,color:'#fff',flexShrink:0}}>Δ</div>
        <div>
          <div style={{fontWeight:700,fontSize:13,letterSpacing:'0.06em'}}>DELPHI</div>
          <div style={{fontSize:9,color:C.text3,letterSpacing:'0.12em',textTransform:'uppercase',...mono}}>Decision OS v2.0</div>
        </div>
      </div>
    </div>

    <div style={{padding:'10px 14px',borderBottom:`1px solid ${C.border}`}}>
      <div style={{fontSize:9,color:C.text3,letterSpacing:'0.1em',textTransform:'uppercase',marginBottom:3,...mono}}>Operator</div>
      <div style={{fontWeight:600,fontSize:12,marginBottom:1}}>ANALYST_D1</div>
      <div style={{fontSize:10,color:C.cyan,...mono}}>Level 5 Clearance</div>
    </div>

    <nav style={{flex:1,padding:'10px 8px',overflowY:'auto'}}>
      {NAV.map(item=>(
        <div key={item.id} onClick={()=>onNav(item.id)} style={{
          display:'flex',alignItems:'center',gap:9,padding:'8px 10px',
          borderRadius:5,marginBottom:1,cursor:'pointer',
          background:active===item.id?`${C.orange}18`:'transparent',
          color:active===item.id?C.orange:C.text2,
          borderLeft:active===item.id?`2px solid ${C.orange}`:'2px solid transparent',
          fontSize:12,fontWeight:active===item.id?600:400,transition:'all 0.12s'
        }}>
          <span style={{fontSize:13,width:16,textAlign:'center',flexShrink:0}}>{item.icon}</span>
          {item.label}
        </div>
      ))}
    </nav>

    <div style={{padding:'12px 14px',borderTop:`1px solid ${C.border}`,display:'flex',flexDirection:'column',gap:5}}>
      {[['DB_SYNC ACTIVE',C.green,true],['KERNEL V4.8.1',C.cyan,false],['REASONING: 100%',C.orange,false]].map(([t,c,p])=>(
        <div key={t} style={{display:'flex',alignItems:'center',gap:6}}>
          <Dot color={c} pulse={p}/>
          <span style={{fontSize:9,color:C.text3,...mono}}>{t}</span>
        </div>
      ))}
    </div>
  </div>
);

// ── TOPBAR ─────────────────────────────────────────────────────────────────
const Topbar = ({ title, crumb }) => (
  <div style={{height:50,borderBottom:`1px solid ${C.border}`,display:'flex',
    alignItems:'center',padding:'0 20px',gap:14,flexShrink:0,background:C.card}}>
    <div style={{flex:1,display:'flex',alignItems:'center',gap:8}}>
      <span style={{fontWeight:700,fontSize:15}}>{title}</span>
      {crumb&&<span style={{fontSize:11,color:C.text3,...mono}}>{crumb}</span>}
    </div>
    <div style={{display:'flex',alignItems:'center',background:C.card2,border:`1px solid ${C.border}`,
      borderRadius:4,padding:'5px 10px',gap:7,width:180}}>
      <span style={{color:C.text3,fontSize:12}}>⌕</span>
      <span style={{fontSize:11,color:C.text3}}>Search parameters...</span>
    </div>
    <div style={{display:'flex',alignItems:'center',gap:14}}>
      <div style={{position:'relative',cursor:'pointer'}}>
        <span style={{fontSize:15,color:C.text2}}>🔔</span>
        <div style={{position:'absolute',top:-3,right:-3,background:C.red,borderRadius:'50%',width:13,height:13,
          display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:700,color:'#fff'}}>3</div>
      </div>
      <span style={{fontSize:14,color:C.text2,cursor:'pointer'}}>⚙</span>
      <div style={{width:26,height:26,borderRadius:'50%',background:C.orange,display:'flex',
        alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,color:'#fff',cursor:'pointer'}}>JD</div>
    </div>
  </div>
);

// ── MISSION CONTROL ────────────────────────────────────────────────────────
const DECISIONS = [
  {id:'DEC-091',ref:'APR_2026_0091',title:'Infrastructure Migration ARM-64',
   gravity:9.2,impact:9,urgency:8,uncertainty:7,irreversibility:9,authority:'LOW',routing:'ESCALATE',
   confidence:78,reversibility:42,optionValue:8.4,fragility:2.1,status:'CRITICAL',
   path:['Assess current x86 workload matrix','Provision ARM pilot cluster (N=12)','Migrate non-critical services first'],
   inverse:'34% risk of cache coherence failures under sustained load spikes exceeding P95.',
   exegesis:'System identifies critical timing dependency in the finance module. ARM migration during Q2 reporting window carries high state corruption risk. Recommend phased approach with rollback checkpoints at each stage boundary.',
   conditions:['If finance module cache miss rate exceeds 8% in ARM pilot, abort and revert to x86 indefinitely.','If ARM latency benchmark exceeds 340ms P99, full migration halted pending architecture review.'],
   tags:['REVERSIBLE','HIGH CONF']},
  {id:'DEC-092',ref:'APR_2026_0092',title:'Q3 Market Expansion — Southeast Asia',
   gravity:7.8,impact:8,urgency:6,uncertainty:8,irreversibility:7,authority:'HIGH',routing:'ACT',
   confidence:92,reversibility:71,optionValue:7.1,fragility:1.8,status:'ACTIVE',
   path:['Establish Singapore legal entity','Activate regional distribution partner','Soft launch in SG/MY markets Q3'],
   inverse:'18% risk of regulatory friction in MY market timeline slippage by 90 days.',
   exegesis:'Competitive window identified. Three rivals delayed expansion. Market entry cost 40% lower than 6-month projection. Authority sufficient for immediate commitment.',
   conditions:['If MAS entity approval exceeds 60 days, pivot to partner-model entry without direct entity.','If Q3 GDP contraction exceeds 2%, delay by one quarter and reassess.'],
   tags:['HIGH CONF','WINDOW OPEN']},
  {id:'DEC-093',ref:'APR_2026_0093',title:'Series B Valuation Cap Negotiation',
   gravity:6.4,impact:9,urgency:4,uncertainty:6,irreversibility:8,authority:'LOW',routing:'ESCALATE',
   confidence:65,reversibility:28,optionValue:6.8,fragility:3.4,status:'PENDING',
   path:['Prepare financial model variants (3 scenarios)','Map investor priority matrix','Define walk-away conditions pre-term sheet'],
   inverse:'22% probability of down-round conditions if engagement delayed past 45 days.',
   exegesis:'Valuation anchoring effects detected across three comparable transactions. Current market sentiment window: 14 days. Recommend establishing floor before term sheet arrives.',
   conditions:['If lead investor introduces participating preferred terms, switch to flat common preference.','If comparable valuations drop 15%+ in 30 days, reduce ask by 20% proactively.'],
   tags:['IRREVERSIBLE','ESCALATE']},
  {id:'DEC-094',ref:'APR_2026_0094',title:'Hire VP Engineering (External)',
   gravity:4.1,impact:6,urgency:3,uncertainty:5,irreversibility:5,authority:'HIGH',routing:'DEFER',
   confidence:81,reversibility:85,optionValue:5.2,fragility:1.4,status:'QUEUED',
   path:['Define structured role scorecard','Activate executive search firm','Run blind structured panel interviews'],
   inverse:'9% risk of internal morale impact if external hire announced before internal pipeline exhausted.',
   exegesis:'No urgency trigger detected. Internal candidate pipeline has 60-day runway. Recommend batching with Q3 headcount review cycle.',
   conditions:['If internal candidate pipeline empties by June, trigger external search immediately.','If engineering velocity drops 25% over 6 weeks, accelerate timeline.'],
   tags:['DEFERRABLE']},
];

const RouteBadge = ({ r }) => {
  const m={ESCALATE:[C.red,'ESCALATE ↑'],ACT:[C.green,'ACT NOW'],DEFER:[C.text3,'DEFER']};
  const [c,l]=m[r]||[C.text3,r];
  return <Badge color={c}>{l}</Badge>;
};

const MissionControl = () => {
  const [sel, setSel] = useState(DECISIONS[0]);
  const [tab, setTab] = useState('forward');
  const [pulse, setPulse] = useState(4);

  useEffect(()=>{
    const id=setInterval(()=>setPulse(p=>(p+1)%8),1800);
    return ()=>clearInterval(id);
  },[]);

  const routeColor = r=>r==='ESCALATE'?C.red:r==='ACT'?C.green:C.text3;

  return (
    <div style={{display:'flex',height:'100%',overflow:'hidden'}}>

      {/* ── LEFT: FEED ── */}
      <div style={{width:280,borderRight:`1px solid ${C.border}`,display:'flex',flexDirection:'column',flexShrink:0}}>
        {/* Loop header */}
        <div style={{padding:'10px 14px',borderBottom:`1px solid ${C.border}`,background:C.card2}}>
          <SLabel>Attention Engine</SLabel>
          <div style={{display:'flex',gap:2,flexWrap:'wrap'}}>
            {['SENSE','FRAME','SIM','STRESS','JUDGE','ACT','OBSERVE','UPDATE'].map((s,i)=>(
              <span key={s} style={{fontSize:8,...mono,padding:'3px 5px',borderRadius:2,
                background:i===4?C.orange:i===pulse?`${C.cyan}22`:C.border,
                color:i===4?'#fff':i===pulse?C.cyan:C.text3,
                fontWeight:i===4?700:400,transition:'all 0.3s',lineHeight:'14px'}}>
                {s}
              </span>
            ))}
          </div>
        </div>

        {/* Gravity feed */}
        <div style={{flex:1,overflowY:'auto',padding:'10px 10px'}}>
          <SLabel right={<span style={{fontSize:9,color:C.text3,...mono}}>{DECISIONS.length} ACTIVE</span>}>
            Decision Gravity Feed
          </SLabel>
          {DECISIONS.map(dec=>{
            const gCol=dec.gravity>=8?C.red:dec.gravity>=6?C.amber:C.cyan;
            const isSel=sel?.id===dec.id;
            return (
              <div key={dec.id} onClick={()=>{setSel(dec);setTab('forward');}} style={{
                padding:'10px 10px',borderRadius:5,marginBottom:6,cursor:'pointer',
                background:isSel?C.card2:'transparent',
                border:`1px solid ${isSel?C.border2:C.border}`,transition:'all 0.12s'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                  <span style={{fontSize:8,color:C.text3,...mono}}>{dec.id}</span>
                  <RouteBadge r={dec.routing}/>
                </div>
                <div style={{fontSize:12,fontWeight:600,marginBottom:7,lineHeight:1.4,color:isSel?C.text1:C.text2}}>
                  {dec.title}
                </div>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <Bar value={dec.gravity*10} color={gCol} h={3} style={{flex:1}}/>
                  <span style={{fontSize:10,fontWeight:700,color:gCol,...mono,width:22,textAlign:'right'}}>{dec.gravity}</span>
                </div>
              </div>
            );
          })}
        </div>
      </div>

      {/* ── CENTER: DETAIL ── */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',minWidth:0}}>
        {sel && <>
          {/* Decision header */}
          <div style={{padding:'14px 20px',borderBottom:`1px solid ${C.border}`,background:C.card2,flexShrink:0}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12}}>
              <div style={{minWidth:0}}>
                <div style={{fontSize:9,color:C.text3,...mono,marginBottom:4}}>REF: {sel.ref} · {sel.status}</div>
                <div style={{fontSize:17,fontWeight:700,lineHeight:1.3}}>{sel.title}</div>
              </div>
              <div style={{display:'flex',gap:6,flexShrink:0}}>
                <Btn sm>SIMULATE</Btn>
                <Btn sm primary>EXECUTE</Btn>
              </div>
            </div>
            <div style={{display:'flex',gap:6,marginTop:8,flexWrap:'wrap'}}>
              {sel.tags.map(t=><Badge key={t} color={C.cyan}>{t}</Badge>)}
              <RouteBadge r={sel.routing}/>
            </div>
          </div>

          {/* Tabs */}
          <div style={{display:'flex',borderBottom:`1px solid ${C.border}`,flexShrink:0,background:C.card2}}>
            {['forward','inverse','exegesis','counterfactual','aar'].map(t=>(
              <div key={t} onClick={()=>setTab(t)} style={{
                padding:'8px 16px',fontSize:11,cursor:'pointer',fontWeight:500,
                textTransform:'capitalize',letterSpacing:'0.03em',
                color:tab===t?C.orange:C.text3,
                borderBottom:tab===t?`2px solid ${C.orange}`:'2px solid transparent',
                marginBottom:-1,transition:'color 0.12s'}}>
                {t}
              </div>
            ))}
          </div>

          <div style={{flex:1,overflowY:'auto',padding:'18px 20px'}}>
            {tab==='forward' && (
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
                <Card>
                  <SLabel right={<Badge color={C.green}>PROB: {sel.confidence}%</Badge>}>Forward Path</SLabel>
                  <div style={{fontSize:11,color:C.text3,marginBottom:12}}>Primary Optimization Route</div>
                  {sel.path.map((step,i)=>(
                    <div key={i} style={{display:'flex',gap:10,marginBottom:12,alignItems:'flex-start'}}>
                      <span style={{fontSize:9,color:C.orange,fontWeight:700,...mono,paddingTop:2,flexShrink:0,width:18}}>0{i+1}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:12,fontWeight:500,marginBottom:4,lineHeight:1.4}}>{step}</div>
                        <Bar value={88-i*14} color={C.cyan} h={2}/>
                      </div>
                    </div>
                  ))}
                </Card>
                <div style={{display:'flex',flexDirection:'column',gap:14}}>
                  <Card>
                    <SLabel>Coupling Analysis</SLabel>
                    {[['Spatial Progress',82,C.cyan],['Temporal Alignment',64,C.orange],['Resource Coherence',71,C.green]].map(([l,v,c])=>(
                      <div key={l} style={{marginBottom:10}}>
                        <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                          <span style={{fontSize:11,color:C.text2}}>{l}</span>
                          <span style={{fontSize:10,fontWeight:700,color:c,...mono}}>{v}%</span>
                        </div>
                        <Bar value={v} color={c} h={3}/>
                      </div>
                    ))}
                  </Card>
                  <Card>
                    <SLabel>Inverse · Contingency</SLabel>
                    <div style={{fontSize:20,fontWeight:700,color:C.amber,marginBottom:4}}>
                      {sel.impact}% <span style={{fontSize:10,color:C.text3,fontWeight:400,...mono}}>RISK EXP.</span>
                    </div>
                    <div style={{fontSize:11,color:C.text3,lineHeight:1.6}}>{sel.inverse.slice(0,80)}...</div>
                  </Card>
                </div>
              </div>
            )}

            {tab==='inverse' && (
              <div style={{display:'flex',flexDirection:'column',gap:14}}>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:12}}>
                  {[['Risk Exposure','34%',C.red],['Cascade Probability','12%',C.amber],['Recovery Window','72h',C.cyan]].map(([l,v,c])=>(
                    <Card key={l}>
                      <div style={{fontSize:9,color:C.text3,...mono,marginBottom:6}}>{l}</div>
                      <div style={{fontSize:26,fontWeight:700,color:c}}>{v}</div>
                    </Card>
                  ))}
                </div>
                <Card style={{background:`${C.red}0c`,border:`1px solid ${C.red}33`}}>
                  <div style={{fontSize:10,color:C.red,fontWeight:700,marginBottom:8}}>⚠ INVERSION ANALYSIS — FAILURE MODES</div>
                  <div style={{fontSize:12,color:C.text2,lineHeight:1.7,marginBottom:10}}>{sel.inverse}</div>
                  <div style={{fontSize:11,color:C.text3,borderTop:`1px solid ${C.border}`,paddingTop:10}}>
                    Fallback protocol: revert to legacy state if node failure rate exceeds 4% within 30-minute window.
                  </div>
                </Card>
              </div>
            )}

            {tab==='exegesis' && (
              <div style={{display:'flex',flexDirection:'column',gap:14}}>
                <Card>
                  <SLabel>✦ Exegesis — Context Reconstruction</SLabel>
                  <div style={{fontSize:13,color:C.text2,lineHeight:1.8,borderLeft:`2px solid ${C.orange}`,paddingLeft:14,marginBottom:16}}>
                    {sel.exegesis}
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                    <div style={{padding:12,background:C.card2,borderRadius:5,border:`1px solid ${C.border}`}}>
                      <div style={{fontSize:9,color:C.text3,...mono,marginBottom:8}}>KEY ACTORS</div>
                      {['Lead Analyst','Strategy Team','GPT-4o Agent'].map(a=>(
                        <div key={a} style={{fontSize:11,color:C.text2,marginBottom:5,display:'flex',alignItems:'center',gap:7}}>
                          <Dot color={C.cyan}/>{a}
                        </div>
                      ))}
                    </div>
                    <div style={{padding:12,background:C.card2,borderRadius:5,border:`1px solid ${C.border}`}}>
                      <div style={{fontSize:9,color:C.text3,...mono,marginBottom:8}}>VERIFIED ASSUMPTIONS</div>

const ClusterTopology = ({ clusters, active, onSelect }) => {
  const positions = [
    [120,80],[300,60],[480,90],[160,200],[340,210],[480,190],
  ];
  const edges = [[0,1],[1,2],[0,3],[1,3],[1,4],[2,5],[3,4],[4,5]];
  return (
    <svg width="100%" height="100%" viewBox="0 0 600 280" preserveAspectRatio="xMidYMid meet">
      {/* grid dots */}
      {Array.from({length:8},(_,r)=>Array.from({length:16},(_,c)=>(
        <circle key={`${r}-${c}`} cx={c*40+10} cy={r*36+10} r={1} fill={C.border} opacity={0.4}/>
      )))}
      {/* edges */}
      {edges.map(([a,b],i)=>(
        <line key={i} x1={positions[a][0]} y1={positions[a][1]} x2={positions[b][0]} y2={positions[b][1]}
          stroke={C.border2} strokeWidth="1" strokeDasharray="4 4" opacity={0.6}/>
      ))}
      {/* nodes */}
      {clusters.map((cl,i)=>{
        const [x,y]=positions[i]||[300,140];
        const isActive = cl.id===active;
        const r = isActive ? 24 : 18;
        return (
          <g key={cl.id} onClick={()=>onSelect(cl.id)} style={{cursor:'pointer'}}>
            <circle cx={x} cy={y} r={r+8} fill={`${cl.sc}08`} opacity={isActive?1:0}/>
            <circle cx={x} cy={y} r={r} fill={`${cl.sc}22`} stroke={cl.sc} strokeWidth={isActive?2:1} opacity={isActive?1:0.7}/>
            {cl.status==='SIMULATING'&&<circle cx={x} cy={y} r={r+14} fill="none" stroke={cl.sc} strokeWidth="0.5" opacity={0.3}/>}
            <text x={x} y={y+4} textAnchor="middle" fill={cl.sc} fontSize={isActive?10:8} fontWeight="700" fontFamily="Space Mono">{cl.id.split('_')[0]}</text>
            <text x={x} y={y+r+14} textAnchor="middle" fill={C.text3} fontSize="7" fontFamily="Space Mono">{cl.status}</text>
            {/* member pips */}
            {Array.from({length:Math.min(cl.agents+cl.humans,5)},(_,j)=>(
              <circle key={j} cx={x-10+j*5} cy={y+r+22} r={2.5}
                fill={j<cl.agents?cl.sc:C.orange} opacity={0.8}/>
            ))}
          </g>
        );
      })}
      {/* Legend */}
      <g transform="translate(10,250)">
        <circle cx={6} cy={6} r={3} fill={C.purple}/>
        <text x={12} y={10} fill={C.text3} fontSize="7" fontFamily="Space Mono">AGENT</text>
        <circle cx={52} cy={6} r={3} fill={C.orange}/>
        <text x={58} y={10} fill={C.text3} fontSize="7" fontFamily="Space Mono">HUMAN</text>
      </g>
    </svg>
  );
};

// ── DECISION WIZARD ───────────────────────────────────────────────────────
const WIZARD_STEPS = [
  { id:'define',    num:'01', label:'Define',        icon:'◇', sub:'Name & scope your decision' },
  { id:'frame',     num:'02', label:'Frame',         icon:'⬡', sub:'Assess gravity dimensions' },
  { id:'actors',    num:'03', label:'Actors',        icon:'◎', sub:'Map people, agents & stakes' },
  { id:'simulate',  num:'04', label:'Simulate',      icon:'⊕', sub:'Run forward scenarios' },
  { id:'invert',    num:'05', label:'Stress Test',   icon:'⊗', sub:'Inversion & failure modes' },
  { id:'judge',     num:'06', label:'Judge',         icon:'◈', sub:'Routing verdict & conditions' },
  { id:'commit',    num:'07', label:'Commit',        icon:'✦', sub:'Log & assign ownership' },
];

const WizardStepBar = ({ current, onNav, data }) => (
  <div style={{ display:'flex', alignItems:'stretch', borderBottom:`1px solid ${C.border}`, background:C.card2, flexShrink:0, overflowX:'auto' }}>
    {WIZARD_STEPS.map((s, i) => {
      const idx = WIZARD_STEPS.findIndex(x => x.id === current);
      const done = i < idx;
      const active = s.id === current;
      const locked = i > idx + 1;
      return (
        <div key={s.id} onClick={() => !locked && onNav(s.id)}
          style={{ flex:1, minWidth:100, padding:'12px 14px', cursor: locked ? 'default' : 'pointer',
            borderBottom:`2px solid ${active ? C.orange : done ? C.green : 'transparent'}`,
            marginBottom:-1, opacity: locked ? 0.35 : 1, transition:'all 0.15s',
            background: active ? `${C.orange}0c` : 'transparent' }}>
          <div style={{ display:'flex', alignItems:'center', gap:7, marginBottom:3 }}>
            <div style={{ width:18, height:18, borderRadius:'50%', flexShrink:0,
              background: active ? C.orange : done ? C.green : C.border2,
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:9, fontWeight:700, color:'#fff', ...mono }}>
              {done ? '✓' : s.num}
            </div>
            <span style={{ fontSize:11, fontWeight: active ? 700 : 500,
              color: active ? C.orange : done ? C.green : C.text2 }}>{s.label}</span>
          </div>
          <div style={{ fontSize:9, color:C.text3, paddingLeft:25 }}>{s.sub}</div>
        </div>
      );
    })}
  </div>
);

const DecisionWizard = () => {
  const [step, setStep]     = useState('define');
  const [data, setData]     = useState({
    title:'', context:'', decisionType:'strategic',
    impact:5, urgency:5, uncertainty:5, irreversibility:5,
    actors:[{name:'', role:'human', stake:''}],
    assumptions:[''],
    constraints:[''],
    scenarioA:'', scenarioB:'', scenarioC:'',
    invertRisk:'', invertCascade:'',
    counterfactuals:[''],
    routing:'', conditions:[''],
    owner:'', deadline:'', notes:'',
  });
  const [submitted, setSubmitted] = useState(false);

  const set = (key, val) => setData(d => ({...d, [key]: val}));
  const gravity = ((data.impact + data.urgency + data.uncertainty + data.irreversibility) / 4).toFixed(1);
  const gravityColor = gravity >= 7 ? C.red : gravity >= 5 ? C.amber : C.cyan;

  const stepIdx = WIZARD_STEPS.findIndex(s => s.id === step);
  const next = () => { if (stepIdx < WIZARD_STEPS.length - 1) setStep(WIZARD_STEPS[stepIdx + 1].id); };
  const back = () => { if (stepIdx > 0) setStep(WIZARD_STEPS[stepIdx - 1].id); };

  const inputStyle = {
    background: C.card2, border:`1px solid ${C.border2}`, borderRadius:4,
    padding:'8px 12px', fontSize:12, color:C.text1, width:'100%', outline:'none',
    fontFamily:'Space Grotesk, sans-serif',
  };
  const labelStyle = { fontSize:9, color:C.text3, ...mono, letterSpacing:'0.08em', marginBottom:5, display:'block' };

    <div style={{ marginBottom:16 }}>
      <span style={labelStyle}>{label}</span>
      {children}
    </div>

  if (submitted) return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      height:'100%', gap:18, padding:40, textAlign:'center' }}>
      <div style={{ width:64, height:64, borderRadius:'50%', background:`${C.green}25`,
        border:`2px solid ${C.green}`, display:'flex', alignItems:'center',
        justifyContent:'center', fontSize:28 }}>✓</div>
      <div style={{ fontSize:22, fontWeight:700 }}>Decision Logged</div>
      <div style={{ fontSize:13, color:C.text3, maxWidth:420, lineHeight:1.7 }}>
        <strong style={{ color:C.text1 }}>{data.title || 'Untitled Decision'}</strong> has been committed to the Decision Log with routing verdict <strong style={{ color:data.routing==='ACT'?C.green:data.routing==='ESCALATE'?C.red:C.text2 }}>{data.routing||'DEFER'}</strong>.
        Assigned to <strong style={{ color:C.orange }}>{data.owner||'Unassigned'}</strong>.
      </div>
      <div style={{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:12, width:'100%', maxWidth:480 }}>
        {[['Gravity Score', gravity, gravityColor],
          ['Confidence', `${Math.round(60 + parseFloat(gravity)*4)}%`, C.cyan],
          ['Routing', data.routing||'DEFER', data.routing==='ACT'?C.green:data.routing==='ESCALATE'?C.red:C.text3]
        ].map(([l,v,c]) => (
          <Card key={l} style={{ padding:'12px 14px', textAlign:'center' }}>
            <div style={{ fontSize:8, color:C.text3, ...mono, marginBottom:4 }}>{l}</div>

      </div>
      <div style={{ display:'flex', gap:10 }}>
        <Btn onClick={() => { setSubmitted(false); setStep('define'); setData({
          title:'', context:'', decisionType:'strategic',
          impact:5, urgency:5, uncertainty:5, irreversibility:5,
          actors:[{name:'', role:'human', stake:''}], assumptions:[''], constraints:[''],
          scenarioA:'', scenarioB:'', scenarioC:'', invertRisk:'', invertCascade:'',
          counterfactuals:[''], routing:'', conditions:[''], owner:'', deadline:'', notes:'',

                      placeholder="Stake / interest" style={inputStyle}/>
                    {i === data.actors.length-1

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#ff5500",
  "secondaryColor": "#00d4b4",
  "density": "comfortable"
}/*EDITMODE-END*/;

const SCREENS  = {wizard:DecisionWizard,mission:MissionControl,theater:DecisionTheater,log:DecisionLog,intel:Intelligence,govern:Governance,workspace:Workspace,command:CommandCenter};
const TITLES   = {wizard:'Decision Wizard',mission:'Mission Control',theater:'Decision Theater',log:'Decision Log',intel:'System Intelligence',govern:'Governance',workspace:'Workspace',command:'Command Center'};
const CRUMBS   = {wizard:'Step-by-step decision onboarding',mission:'Attention Engine · JUDGE phase active',theater:'Simulate → Stress → Judge',log:'DB_SYNC: ACTIVE [0x9212]',intel:'S1 · S2 · S3 Cognitive Layers',govern:'Executive Governance Layer',workspace:'Human · AI · Agent Collaboration Layer',command:'OMC · EMC · GK Authority Layers'};

const App = () => {
  const [screen, setScreen] = useState(()=>localStorage.getItem('delphi_screen')||'mission');
  const [tweakUI, setTweakUI] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  useEffect(()=>{ localStorage.setItem('delphi_screen',screen); },[screen]);

  useEffect(()=>{
    const handler = e => {
      if(e.data?.type==='__activate_edit_mode') setTweakUI(true);
      if(e.data?.type==='__deactivate_edit_mode') setTweakUI(false);
    };
    window.addEventListener('message',handler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return ()=>window.removeEventListener('message',handler);
  },[]);

  const ActiveScreen = SCREENS[screen];

  return (
    <div style={{display:'flex',width:'100vw',height:'100vh',background:C.bg,overflow:'hidden'}}>
      <Sidebar active={screen} onNav={setScreen}/>
      <div style={{flex:1,display:'flex',flexDirection:'column',minWidth:0}}>
        <Topbar title={TITLES[screen]} crumb={CRUMBS[screen]}/>
        <div style={{flex:1,overflow:'hidden'}}>
          <ActiveScreen/>
        </div>
      </div>

      {tweakUI && (
        <div style={{position:'fixed',bottom:18,right:18,background:C.card2,border:`1px solid ${C.border2}`,
          borderRadius:8,padding:18,width:240,zIndex:9999,boxShadow:'0 12px 40px rgba(0,0,0,0.6)'}}>
          <div style={{fontWeight:700,marginBottom:14,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <span>Tweaks</span>
            <span onClick={()=>setTweakUI(false)} style={{cursor:'pointer',color:C.text3,fontSize:14}}>✕</span>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:9,color:C.text3,...mono,marginBottom:6}}>ACCENT COLOR</div>
            <input type="color" value={tweaks.accentColor} onChange={e=>{
              const v={...tweaks,accentColor:e.target.value};
              setTweaks(v);
              window.parent.postMessage({type:'__edit_mode_set_keys',edits:v},'*');
            }} style={{width:'100%',height:30,border:'none',borderRadius:4,cursor:'pointer',background:'transparent'}}/>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:9,color:C.text3,...mono,marginBottom:6}}>SECONDARY COLOR</div>
            <input type="color" value={tweaks.secondaryColor} onChange={e=>{
              const v={...tweaks,secondaryColor:e.target.value};
              setTweaks(v);
              window.parent.postMessage({type:'__edit_mode_set_keys',edits:v},'*');
            }} style={{width:'100%',height:30,border:'none',borderRadius:4,cursor:'pointer',background:'transparent'}}/>
          </div>
          <div>
            <div style={{fontSize:9,color:C.text3,...mono,marginBottom:6}}>DENSITY</div>
            {['compact','comfortable','spacious'].map(d=>(
              <label key={d} style={{display:'flex',alignItems:'center',gap:8,marginBottom:5,cursor:'pointer'}}>
                <input type="radio" name="density" checked={tweaks.density===d}
                  onChange={()=>{const v={...tweaks,density:d};setTweaks(v);window.parent.postMessage({type:'__edit_mode_set_keys',edits:v},'*');}}/>
                <span style={{fontSize:12,color:C.text2,textTransform:'capitalize'}}>{d}</span>
              </label>
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
